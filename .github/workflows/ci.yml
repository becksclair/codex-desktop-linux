name: CI

# CI is intentionally disabled.
# Keep this workflow manual-only so GitHub Actions has no automatic push/PR trigger.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: CI disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled CI
        run: echo "CI is disabled for this repository. Restore the previous workflow from git history to re-enable it."
